# Railway config-as-code (repo root).
# Prefer DOCKERFILE builder — most reliable for monorepo + Postgres (psycopg2).
# Alternative: set service Root Directory = backend, builder = RAILPACK, start:
#   uvicorn app.main:app --host 0.0.0.0 --port $PORT

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 120
