# Railway config-as-code (repo root).
# railway.json also sets builder = DOCKERFILE (UI may override either).
# If builds still run Railpack/mise, railpack.json pins python 3.11 + start command.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 120
