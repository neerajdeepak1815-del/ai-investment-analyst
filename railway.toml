# Railway config — repo root deploy (PREFERRED)
# Root Directory in Railway UI must be EMPTY for this file + root Dockerfile.
# See RAILWAY_FIX.md if Root Directory is stuck on "backend".

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 120
