# Railway config-as-code (repo root).
#
# RECOMMENDED: Dockerfile builder (no mise/python step).
# In Railway UI: Service → Settings → Build → Builder → Dockerfile
#
# FALLBACK: Railpack — requires mise.toml / .python-version (3.11.11).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 120
