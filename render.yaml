# Render Blueprint — migrate here if Railway Metal builders are stuck.
# Dashboard: New + → Blueprint → connect GitHub repo.
# Set AUTH_PASSWORD and SEC_USER_AGENT in the Render dashboard after deploy.

services:
  - type: web
    name: meridian-analyst
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: SEC_USER_AGENT
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: meridian-db
          property: connectionString
      - key: AUTH_ENABLED
        value: "true"
      - key: AUTH_USERNAME
        value: "admin"
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTO_REFRESH_ENABLED
        value: "true"
      - key: AUTO_REFRESH_INTERVAL_MINUTES
        value: "15"
      - key: FINNHUB_API_KEY
        sync: false

databases:
  - name: meridian-db
    plan: starter
